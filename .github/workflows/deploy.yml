name: Build and Deploy

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    name: Build and Verify Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-id: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Lint Application
        run: npm run lint --if-present

      - name: Build Full-Stack Application
        run: npm run build
        env:
          NODE_ENV: production

      # Step to upload the production bundle (dist/) as an artifact
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-bundle
          path: dist/
          retention-days: 7

  # Example deployment job (disabled by default, can be integrated with Cloud Run, Render, or VPS)
  # To run this full-stack WebRTC signaling application, it must be hosted on a Node.js-capable environment
  # rather than GitHub Pages (which only supports static static-site SPAs).
  deploy:
    name: Deploy to Production
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-bundle
          path: dist/

      - name: Deploy Instructions
        run: |
          echo "Your production-ready build and full-stack Express server (dist/server.cjs) have been successfully compiled!"
          echo "Since this application includes a dynamic WebSocket signaling backend for WebRTC stream connections, it cannot run on static hosting like GitHub Pages."
          echo "You can deploy this bundle to platforms like Cloud Run, Heroku, Render, Fly.io, or your own VPS by running: npm run start"
